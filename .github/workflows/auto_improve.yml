name: Auto Improvement Pipeline

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:  # Allow manual trigger
  push:
    branches: [ master ]
    paths:
      - '**.py'
      - 'requirements.txt'

jobs:
  discover-sources:
    name: Discover New Data Sources
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run source discovery
        run: |
          python auto_improve.py discover

      - name: Upload discovery report
        uses: actions/upload-artifact@v4
        with:
          name: discovery-report
          path: discoveries/sources_report.json

      - name: Create Issue if new sources found
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const report = JSON.parse(fs.readFileSync('discoveries/sources_report.json', 'utf8'));

              if (report.summary.total_api_candidates > 0) {
                const body = `## 🔍 New Data Sources Discovered\n\n` +
                  `**Summary:**\n` +
                  `- API Candidates: ${report.summary.total_api_candidates}\n` +
                  `- Free APIs: ${report.summary.free_apis}\n` +
                  `- Potential Features: ${report.summary.potential_new_features}\n\n` +
                  `**Top Candidates:**\n` +
                  report.api_candidates.slice(0, 5).map(api =>
                    `- **${api.name}**: ${api.features_potential.join(', ')} (${api.cost})`
                  ).join('\n') +
                  `\n\n_Auto-generated by discovery pipeline_`;

                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `[Auto-Discovery] ${report.summary.total_api_candidates} new data source(s) found`,
                  body: body,
                  labels: ['enhancement', 'auto-discovery']
                });
              }
            } catch (error) {
              console.log('No report file found or error reading it');
            }

  health-check:
    name: API Health Monitoring
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Check API health
        id: health
        run: |
          python auto_improve.py health > health_output.txt
          cat health_output.txt

      - name: Notify on unhealthy APIs
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[Alert] API Health Check Failed',
              body: 'One or more APIs are unhealthy. Check the workflow logs for details.',
              labels: ['bug', 'high-priority']
            });

  dependency-updates:
    name: Check Dependency Updates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pip-check-updates

      - name: Check for outdated packages
        run: |
          pip list --outdated

      - name: Auto-create Dependabot PRs
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            requirements:
              - requirements.txt

  optimization-analysis:
    name: Performance Optimization Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run optimization analysis
        run: |
          python auto_improve.py optimize > optimization_report.txt
          cat optimization_report.txt

      - name: Upload optimization report
        uses: actions/upload-artifact@v4
        with:
          name: optimization-report
          path: optimization_report.txt

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install quality tools
        run: |
          pip install pylint black isort mypy

      - name: Run linters
        run: |
          # Format check
          black --check *.py || echo "Black formatting needed"

          # Import sorting
          isort --check-only *.py || echo "Import sorting needed"

          # Type checking
          mypy *.py --ignore-missing-imports || echo "Type hints needed"

      - name: Run pylint
        run: |
          pylint *.py --exit-zero --output-format=json > pylint_report.json || true

      - name: Upload quality report
        uses: actions/upload-artifact@v4
        with:
          name: code-quality-report
          path: pylint_report.json

  test-suite:
    name: Run Test Suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          pytest tests/ --cov=. --cov-report=xml || echo "No tests found yet"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  create-improvement-pr:
    name: Create Auto-Improvement PR
    runs-on: ubuntu-latest
    needs: [discover-sources, optimization-analysis]
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create improvement branch
        run: |
          git config user.name "Auto Improve Bot"
          git config user.email "bot@email-intelligence.ai"

          BRANCH_NAME="auto-improve/$(date +%Y%m%d)"
          git checkout -b $BRANCH_NAME || git checkout $BRANCH_NAME

          # Add discovery reports
          git add discoveries/ || true
          git commit -m "chore: weekly auto-discovery and optimization analysis" || true

          git push origin $BRANCH_NAME || true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: weekly auto-improvement updates'
          title: '[Auto-Improve] Weekly optimization and discovery'
          body: |
            ## 🤖 Automated Improvement PR

            This PR contains automated discoveries and optimizations from the weekly auto-improvement pipeline.

            ### Changes:
            - ✅ Source discovery completed
            - ✅ API health check passed
            - ✅ Performance analysis completed
            - ✅ Code quality checked

            ### Next Steps:
            1. Review discovery report for new data sources
            2. Evaluate optimization suggestions
            3. Consider implementing high-priority improvements

            **Auto-generated on:** $(date)
          branch: auto-improve/weekly
          labels: |
            automated
            enhancement
            auto-improve
